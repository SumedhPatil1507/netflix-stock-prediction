data:
  source: csv
  csv_path: data/netflix.csv
  ticker: NFLX
  yf_period: max

features:
  lag_periods: [1, 2, 3, 5, 10, 20]
  ret_lag_periods: [1, 2, 3, 5]
  ma_windows: [5, 7, 10, 21, 50, 200]
  rsi_periods: [7, 14]
  bb_window: 20
  atr_window: 14
  stoch_window: 14
  cci_window: 20
  volatility_window: 20

model:
  n_splits_oof: 3
  n_splits_cv: 5
  train_ratio: 0.8
  xgb_n_estimators: 600
  xgb_learning_rate: 0.03
  xgb_max_depth: 5
  xgb_subsample: 0.8
  xgb_colsample: 0.8
  lgbm_n_estimators: 600
  lgbm_learning_rate: 0.03
  lgbm_max_depth: 5
  rf_n_estimators: 400
  rf_max_depth: 10
  et_n_estimators: 400
  et_max_depth: 10
  ridge_alpha: 1.0

backtest:
  transaction_cost: 0.001
  risk_free_rate: 0.05

regime:
  n_states: 3
  n_iter: 200
  enabled: true

conformal:
  alpha: 0.1
  cal_ratio: 0.1
  enabled: true

model_path: models/model.pkl
output_dir: outputs
log_level: INFO
